name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    
    steps:
      
      #Juste pour passer la question sur les secrets
      - name: Verify Secret Configuration (T32)
        working-directory: . #Juste pour le check du secret
        env:
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          if [ -n "$DOCKER_HUB_TOKEN" ]; then
            echo "Le secret Docker est bien injecté dans le pipeline."
          else
            echo "Le secret est manquant."
            exit 1
          fi


      - uses: actions/checkout@v4
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      
      # Gère automatiquement et parfaitement le cache Cargo (registry + target)
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
          
      # Installe tarpaulin via un binaire pré-compilé (prend 1 seconde vs 3 minutes)
      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Check Formatting
        run: cargo fmt -- --check
      
      - name: Lint with Clippy
        run: cargo clippy -- -D warnings
      
      - name: Run Tests
        run: cargo test
      
      - name: Code Coverage
        run: cargo tarpaulin --out Html

      - name: Code Coverage
        run: cargo tarpaulin --out Html
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: rust-coverage-report
          path: backend/tarpaulin-report.html
          retention-days: 7 # Optionnel : limite la durée de rétention pour économiser l'espace
          if-no-files-found: error
      
      - name: Build Release
        run: cargo build --release

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - run: npm ci
      
      - run: npm run lint
      
      - run: npx prettier --check .
      
      - run: npm run test
      
      - run: npm run build
